# ═══════════════════════════════════════════════════════════
# AWS Deployment Configuration for Gautam Singh Model
# ═══════════════════════════════════════════════════════════

# AWS Configuration
AWS_REGION="us-east-1"
INSTANCE_TYPE="t2.micro"
UBUNTU_VERSION="24.04"

# Security Settings
SECURITY_GROUP_NAME="gautam-singh-model-sg"
KEY_PAIR_NAME="gautam-singh-keypair"

# Instance Configuration
INSTANCE_NAME="gautam-singh-model"
INSTANCE_TAGS="Project=GautamSinghModel,Environment=Production"

# Application Configuration
DJANGO_ENV="production"
DEBUG="False"
DEMO_MODE="True"

# Domain Configuration (Update with your domain)
DOMAIN_NAME=""
SSL_EMAIL=""

# Backup Configuration
BACKUP_RETENTION_DAYS=7
MONITORING_ENABLED="true"

# Performance Settings
CPU_THRESHOLD=80
MEMORY_THRESHOLD=85
DISK_THRESHOLD=90